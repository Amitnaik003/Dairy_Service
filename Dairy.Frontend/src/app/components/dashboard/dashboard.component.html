<div class="dashboard-body">
    <nav class="glass-nav">
        <div class="logo">DairyHub <span class="badge">{{ role }}</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="color: white; font-weight: 600;">Welcome, {{ username }}</span>
            <button (click)="logout()" class="btn-secondary">Logout</button>
        </div>
    </nav>
    <main class="container">
        <div class="header-action">
            <h2>Product Inventory</h2>
            <button *ngIf="isAdmin" (click)="openModal()" class="btn-primary">Add New Product</button>
        </div>

        <!-- Add Product Form Modal -->
        <div *ngIf="showModal" class="glass-container" style="margin-bottom: 2rem;">
            <h3>Add Product</h3>
            <div class="form-group">
                <input type="text" [(ngModel)]="newProduct.name" placeholder="Name">
                <input type="number" [(ngModel)]="newProduct.fatContentPercentage" placeholder="Fat Content %">
                <input type="text" [(ngModel)]="newProduct.storageTemperatureRange" placeholder="Storage Temp (e.g. 2°C - 4°C)">
                <input type="number" [(ngModel)]="newProduct.stockQuantity" placeholder="Stock Quantity">
                <button (click)="saveProduct()" class="btn-primary">Save</button>
                <button (click)="closeModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>

        <div class="table-container glass-container">
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Fat %</th>
                        <th *ngIf="isAdmin">Temp Required</th>
                        <th *ngIf="isAdmin">Stock</th>
                        <th>Fresh?</th>
                        <th *ngIf="isAdmin">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let p of products">
                        <td>{{ p.name }}</td>
                        <td>{{ p.fatContent }}%</td>
                        <td *ngIf="isAdmin">{{ p.temperatureRequired }}</td>
                        <td *ngIf="isAdmin">{{ p.stockQuantity }}</td>
                        <td>{{ p.isFresh ? 'Yes' : 'No' }}</td>
                        <td *ngIf="isAdmin">
                            <button class="btn-secondary btn-sm" (click)="deleteProduct(p.productId)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
