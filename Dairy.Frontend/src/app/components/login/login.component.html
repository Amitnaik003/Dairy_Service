<div class="login-body">
    <div class="glass-container login-box">
        <h1>DairyHub</h1>
        <p>Sign in to manage inventory</p>
        <form (ngSubmit)="login()">
            <input type="text" [(ngModel)]="credentials.username" name="username" placeholder="Username" required>
            <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
            <div *ngIf="errorMsg" class="error">{{ errorMsg }}</div>
        </form>
    </div>
</div>
