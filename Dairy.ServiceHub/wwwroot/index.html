<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DairyHub - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="glass-container login-box">
        <h1>DairyHub</h1>
        <p>Sign in to manage inventory</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username (admin / user)" required>
            <input type="password" id="password" placeholder="Password (admin123 / user123)" required>
            <button type="submit" class="btn-primary">Login</button>
            <div id="errorMsg" class="error"></div>
        </form>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
