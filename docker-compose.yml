services:
  dairy-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      # We commented this out so your appsettings.json link takes priority!
      # - MongoDb__ConnectionString=mongodb://dairy-db:27017
      - MongoDb__DatabaseName=DairyDB

  dairy-frontend:
    build:
      context: ./Dairy.Frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - dairy-api

